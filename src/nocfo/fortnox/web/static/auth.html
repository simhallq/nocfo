<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>BankID — Fortnox</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: #333;
  }
  .container {
    text-align: center;
    padding: 2rem;
    max-width: 400px;
  }
  h1 {
    font-size: 1.4rem;
    margin-bottom: 0.5rem;
    color: #3B8C3E;
  }
  .subtitle {
    font-size: 0.9rem;
    color: #666;
    margin-bottom: 1.5rem;
  }
  #qr-img {
    width: 280px;
    height: 280px;
    border: 2px solid #ddd;
    border-radius: 12px;
    background: #fff;
    object-fit: contain;
    display: none;
  }
  #status {
    margin-top: 1rem;
    font-size: 1rem;
    padding: 0.5rem 1rem;
    border-radius: 8px;
  }
  .status-waiting { background: #fff3cd; color: #856404; }
  .status-ok { background: #d4edda; color: #155724; }
  .status-error { background: #f8d7da; color: #721c24; }
  .btn {
    display: none;
    background: #3B8C3E;
    color: #fff;
    text-decoration: none;
    font-size: 1.1rem;
    font-weight: 600;
    padding: 0.9rem 2rem;
    border-radius: 10px;
    margin: 1rem auto 0.5rem;
    width: 100%;
    max-width: 280px;
    text-align: center;
    border: none;
    cursor: pointer;
  }
  .btn:active { background: #2d6b30; }
  .spinner {
    display: inline-block;
    width: 40px;
    height: 40px;
    border: 4px solid #ddd;
    border-top-color: #3B8C3E;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 2rem auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <h1>Fortnox BankID</h1>
  <p class="subtitle" id="subtitle">Förbereder BankID-inloggning...</p>
  <div id="spinner" class="spinner"></div>
  <a id="bankid-btn" class="btn" href="#">Öppna BankID</a>
  <img id="qr-img" alt="BankID QR Code">
  <button id="retry-btn" class="btn">Försök igen</button>
  <div id="status" class="status-waiting">Ansluter...</div>
</div>
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var token = params.get('token');
  if (!token) {
    document.getElementById('status').textContent = 'Saknar token';
    document.getElementById('status').className = 'status-error';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('subtitle').textContent = '';
    return;
  }

  var img = document.getElementById('qr-img');
  var status = document.getElementById('status');
  var spinner = document.getElementById('spinner');
  var subtitle = document.getElementById('subtitle');
  var bankidBtn = document.getElementById('bankid-btn');
  var retryBtn = document.getElementById('retry-btn');
  var lastUri = '';
  var evtSource = null;
  var terminated = false;

  // Detect mobile (touch device with small screen)
  var isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  function connectSSE() {
    if (terminated) return;

    // Reset UI
    spinner.style.display = 'inline-block';
    img.style.display = 'none';
    bankidBtn.style.display = 'none';
    retryBtn.style.display = 'none';
    subtitle.textContent = 'Startar BankID...';
    status.textContent = 'Ansluter...';
    status.className = 'status-waiting';
    lastUri = '';

    evtSource = new EventSource('/auth/stream?token=' + encodeURIComponent(token));

    evtSource.addEventListener('context', function() {
      subtitle.textContent = 'Startar BankID...';
      status.textContent = 'Väntar på BankID...';
      status.className = 'status-waiting';
    });

    evtSource.addEventListener('qr', function(e) {
      spinner.style.display = 'none';
      retryBtn.style.display = 'none';

      if (isMobile && !lastUri) {
        // On mobile: show QR with instruction to use a computer instead.
        // Fortnox doesn't expose autoStartToken, so bankid:// deep link
        // is not possible. QR must be scanned from another device.
        var d = e.data;
        try { var t = atob(d.substring(0, 20)); } catch(x) { var t = ''; }
        img.src = (t.indexOf('<svg') >= 0 ? 'data:image/svg+xml;base64,' : 'data:image/png;base64,') + d;
        img.style.display = 'block';
        subtitle.textContent = 'Öppna denna länk på en dator';
        status.textContent = 'Skanna QR-koden med BankID-appen på din mobil';
        status.className = 'status-waiting';
      } else if (!isMobile) {
        // On desktop: show QR for scanning from another device
        var d = e.data;
        try { var t = atob(d.substring(0, 20)); } catch(x) { var t = ''; }
        img.src = (t.indexOf('<svg') >= 0 ? 'data:image/svg+xml;base64,' : 'data:image/png;base64,') + d;
        img.style.display = 'block';
        subtitle.textContent = 'Skanna QR-koden med BankID-appen';
        status.textContent = 'Skanna QR-koden med BankID-appen';
        status.className = 'status-waiting';
      }
    });

    evtSource.addEventListener('bankid_uri', function(e) {
      var uri = e.data;
      if (uri && uri !== lastUri) {
        bankidBtn.href = uri;
        bankidBtn.style.display = 'block';
        spinner.style.display = 'none';
        lastUri = uri;

        if (isMobile) {
          subtitle.textContent = 'Tryck på knappen för att logga in';
          status.textContent = 'Öppna BankID-appen';
          status.className = 'status-waiting';
        }
      }
    });

    evtSource.addEventListener('waiting', function() {
      status.textContent = 'Startar BankID...';
      status.className = 'status-waiting';
    });

    evtSource.addEventListener('status', function(e) {
      evtSource.close();
      spinner.style.display = 'none';
      bankidBtn.style.display = 'none';
      if (e.data === 'authenticated' || e.data === 'complete') {
        terminated = true;
        img.style.display = 'none';
        retryBtn.style.display = 'none';
        subtitle.textContent = '';
        status.textContent = 'Inloggad! Du kan stänga den här sidan.';
        status.className = 'status-ok';
      } else if (e.data === 'failed') {
        img.style.display = 'none';
        subtitle.textContent = 'Tidsgränsen nåddes';
        status.textContent = 'Inloggningen misslyckades.';
        status.className = 'status-error';
        retryBtn.style.display = 'block';
      } else {
        subtitle.textContent = '';
        status.textContent = 'Sessionen avslutades.';
        status.className = 'status-error';
        retryBtn.style.display = 'block';
      }
    });

    evtSource.addEventListener('error', function() {
      status.textContent = 'Anslutningsfel — försöker igen...';
      status.className = 'status-error';
    });

    evtSource.onerror = function() {
      status.textContent = 'Anslutningen bröts — ansluter igen...';
      status.className = 'status-error';
    };
  }

  retryBtn.addEventListener('click', function() {
    if (evtSource) evtSource.close();
    connectSSE();
  });

  connectSSE();
})();
</script>
</body>
</html>
