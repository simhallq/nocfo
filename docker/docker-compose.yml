services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    user: root
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      FORTNOX_API_URL: http://host.docker.internal:8790
      FORTNOX_API_TOKEN: ${FORTNOX_API_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./data/openclaw}:/home/node/.openclaw
      - ${FREY_WORKSPACE_DIR:-../workspace}:/home/node/.openclaw/workspace
      - ${FREY_SKILLS_DIR:-../skills}:/home/node/.openclaw/skills
      - ../openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ../tools/fortnox:/home/node/.openclaw/plugins/fortnox:ro
    ports:
      - "127.0.0.1:18789:18789"
      - "127.0.0.1:18790:18790"
    security_opt:
      - seccomp=unconfined
    cap_add:
      - SYS_ADMIN
    extra_hosts:
      - "host.docker.internal:host-gateway"
    init: true
    restart: unless-stopped
    command:
      [
        "sh", "-c",
        "ln -sf /app/openclaw.mjs /usr/local/bin/openclaw && exec su -s /bin/sh node -c 'node dist/index.js gateway --allow-unconfigured --bind ${OPENCLAW_GATEWAY_BIND:-lan} --port 18789'"
      ]

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    profiles: [cli]
    environment:
      HOME: /home/node
      TERM: xterm-256color
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      FORTNOX_API_URL: http://host.docker.internal:8790
      FORTNOX_API_TOKEN: ${FORTNOX_API_TOKEN:-}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-./data/openclaw}:/home/node/.openclaw
      - ${FREY_WORKSPACE_DIR:-../workspace}:/home/node/.openclaw/workspace
      - ${FREY_SKILLS_DIR:-../skills}:/home/node/.openclaw/skills
      - ../openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro
      - ../tools/fortnox:/home/node/.openclaw/plugins/fortnox:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
